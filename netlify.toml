[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

[functions."epic-report-processor"]
  schedule = "*/15 * * * *"

# Friday 3pm CDT executive recap.
# Cron is in UTC. CDT = UTC-5 in summer, so 3pm CDT = 20:00 UTC.
# (When DST ends and we shift to CST = UTC-6, this would need to be 21:00 UTC.
#  Re-check in Nov when clocks fall back.)
[functions."send-weekly-recap"]
  schedule = "0 20 * * 5"

# Monday 8am CDT rep rollup.
# 8am CDT = 13:00 UTC.
[functions."send-rep-rollup"]
  schedule = "0 13 * * 1"

# Friday 8am CDT weekly usage digest (Phase 1C — owner-only usage analytics).
# 8am CDT = 13:00 UTC. Deliberately a morning slot, separate from the
# send-weekly-recap email at 3pm Friday, so the two don't arrive together.
# DST note: same as above — when clocks fall back to CST (UTC-6), 8am CDT
# becomes 14:00 UTC. Re-check in Nov along with send-weekly-recap.
[functions."send-usage-digest"]
  schedule = "0 13 * * 5"

# Thrice-daily open-request digest (Requests board → David's inbox).
# Runs 8am, 12pm, 4pm CDT = 13:00, 17:00, 21:00 UTC.
# Skips sending entirely when there are no open requests.
# DST note: when clocks fall back to CST (UTC-6) these arrive at
# 7am/11am/3pm local — accepted one-hour drift. Re-check in Nov.
[functions."send-request-digest"]
  schedule = "0 13,17,21 * * *"
